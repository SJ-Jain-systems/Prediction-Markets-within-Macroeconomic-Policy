name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev extras
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

      - name: Execute notebooks offline (synthetic data, no network)
        env:
          MPLBACKEND: Agg
        run: |
          for nb in notebooks/*.ipynb; do
            echo "Executing $nb"
            jupyter nbconvert --to notebook --execute --output-dir /tmp/nb-out "$nb"
          done
